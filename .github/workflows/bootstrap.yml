name: Terraform Boostrap

on:
    push:
        branches: 
            - main

env:
    TF_CLOUD_ORGANIZATION: "wojlys-org"
    TF_WORKSPACE: "gcp-bootstrap"
    TF_DIRECTORY: "."
    TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

jobs:
    terraform:
        runs-on: ubuntu-latest
        steps:
        - name: Upload configuration to HCP Terraform
          id: upload
          uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
          with:
            workspace: ${{ env.TF_WORKSPACE }}
            directory: ${{ env.TF_DIRECTORY }}
            speculative: false
        - name: Create run
          uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
          with:
            workspace: ${{ env.TF_WORKSPACE }}
            configuration_version: ${{ steps.upload.outputs.configuration.configuration_version_id }}
            plan_only: true

